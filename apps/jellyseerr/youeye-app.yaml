apiVersion: v1
kind: app
integration: basic
version: "2.7.3"

metadata:
  id: "jellyseerr"
  name: "Jellyseerr"
  description: "Media request and discovery manager for Jellyfin"
  icon: "popcorn"
  category: "media"
  website: "https://docs.jellyseerr.dev"
  developer: "Fallenbagel & contributors"
  license: "MIT"
  sourceCode: "https://github.com/fallenbagel/jellyseerr"
  support: "https://github.com/fallenbagel/jellyseerr/discussions"
  docs: "https://docs.jellyseerr.dev"
  tagline: "Let your users request the media they want"
  tags: ["media", "requests", "discovery", "jellyfin", "arr"]
  defaultSubdomain: "jellyseerr"

detail:
  longDescription: |
    Jellyseerr is a free, open-source request-management and media-discovery tool built to
    work with Jellyfin. Users browse movies and TV shows, request what they want to watch,
    and Jellyseerr hands the request to Sonarr or Radarr to download and add it to the
    library automatically. Admins get approval workflows, per-user quotas, and a single
    place to see what everyone is asking for.
  screenshots: []

database:
  mode: none

containers:
  - name: "main"
    type: oci
    primary: true
    image: "docker.io/fallenbagel/jellyseerr:2.7.3"
    port: 5055
    network: internet
    volumes:
      - name: config
        host: "/var/lib/youeye/app-${app.id}/config"
        container: "/app/config"
        type: config
    healthCheck:
      type: "http"
      path: "/api/v1/status"
      timeout: 120000

wants:
  - appId: jellyfin
    name: "Jellyfin"
    description: "Sync libraries and users from Jellyfin"
    scope: service
  - appId: sonarr
    name: "Sonarr"
    description: "Send TV requests to Sonarr"
    scope: service
  - appId: radarr
    name: "Radarr"
    description: "Send movie requests to Radarr"
    scope: service

env_mapping:
  TZ: "Etc/UTC"
