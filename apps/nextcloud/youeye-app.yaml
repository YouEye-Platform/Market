apiVersion: v1
kind: app
integration: basic
version: "34.0.0"

metadata:
  id: "nextcloud"
  name: "Nextcloud"
  description: "Cloud storage, collaboration, and file sharing"
  icon: "cloud"
  iconUrl: "icon.svg"
  category: "productivity"
  website: "https://nextcloud.com"
  developer: "Nextcloud GmbH"
  license: "AGPL-3.0"
  sourceCode: "https://github.com/nextcloud/server"
  support: "https://help.nextcloud.com"
  docs: "https://docs.nextcloud.com"
  tagline: "Your files, contacts and calendars at home"
  tags: ["cloud", "storage", "files", "collaboration", "office"]
  defaultSubdomain: "cloud"

detail:
  longDescription: |
    Nextcloud is a suite of client-server software for creating and using file hosting services.
    Features file sync, calendars, contacts, mail, talk, office document editing, and hundreds
    of community apps.
  screenshots:
    - path: "https://raw.githubusercontent.com/nextcloud/screenshots/master/files-tab.png"
      caption: "Nextcloud file manager"

capabilities:
  smtp: true

database:
  mode: shared
  name: "nextcloud"
  user: "nextcloud"

secrets:
  - name: "db_password"
    file: ".db_password"
    generator: "password"
    length: 32
  - name: "admin_password"
    file: ".admin_password"
    generator: "password"
    length: 24

credentials:
  - label: "Admin Account"
    username: "admin"
    passwordSecret: "admin_password"

containers:
  - name: "valkey"
    type: oci
    image: "docker.io/valkey/valkey:8-alpine"

  - name: "main"
    type: oci
    primary: true
    image: "docker.io/library/nextcloud:34.0.0-apache"
    port: 80
    network: internet
    volumes:
      - name: html
        host: "/var/lib/youeye/app-${app.id}/html"
        container: "/var/www/html"
        type: data
    healthCheck:
      type: "http"
      path: "/status.php"
      timeout: 300000

env_mapping:
  POSTGRES_HOST: "${database.host}"
  POSTGRES_DB: "${database.name}"
  POSTGRES_USER: "${database.user}"
  POSTGRES_PASSWORD: "${database.password}"
  NEXTCLOUD_ADMIN_USER: "admin"
  NEXTCLOUD_ADMIN_PASSWORD: "${secrets.admin_password}"
  NEXTCLOUD_TRUSTED_DOMAINS: "${app.fqdn} localhost"
  NEXTCLOUD_TRUSTED_PROXIES: "10.76.0.0/16"
  OVERWRITEPROTOCOL: "https"
  OVERWRITEHOST: "${app.fqdn}"
  REDIS_HOST: "${containers.valkey.internal_host}"
  REDIS_PORT: "6379"
  SMTP_HOST: "${smtp.host}"
  SMTP_PORT: "${smtp.port}"
  SMTP_NAME: "${smtp.user}"
  SMTP_PASSWORD: "${smtp.password}"
  MAIL_FROM_ADDRESS: "${smtp.from}"
  SMTP_SECURE: "tls"

uninstall:
  dropSharedDatabase: true
