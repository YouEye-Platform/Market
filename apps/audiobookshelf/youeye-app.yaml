apiVersion: v1
kind: app
integration: basic
version: "2.35.1"

metadata:
  id: "audiobookshelf"
  name: "Audiobookshelf"
  description: "Audiobook and podcast server with progress tracking"
  icon: "headphones"
  iconUrl: "icon.svg"
  category: "media"
  website: "https://www.audiobookshelf.org"
  tags: ["audiobooks", "podcasts", "media", "streaming"]
  defaultSubdomain: "audiobooks"

detail:
  longDescription: |
    Audiobookshelf is a self-hosted audiobook and podcast server. Features include per-user
    progress tracking, chapter support, bookmarks, sleep timer, playback speed control,
    and companion apps for Android and iOS. Import your audiobook collection and listen from
    anywhere.
  screenshots:
    - path: "https://raw.githubusercontent.com/advplyr/audiobookshelf-web/master/static/Logo.png"
      caption: "Audiobookshelf library view"

database:
  mode: none

secrets:
  - name: "admin_password"
    file: ".admin_password"
    generator: "password"
    length: 24

credentials:
  - label: "Admin Account"
    username: "admin"
    passwordSecret: "admin_password"

containers:
  - name: "main"
    type: oci
    primary: true
    image: "docker.io/advplyr/audiobookshelf:2.35.1"
    port: 80
    network: internet
    volumes:
      - name: config
        host: "/var/lib/youeye/app-${app.id}/config"
        container: "/config"
        type: config
      - name: audiobooks
        host: "/var/lib/youeye/app-${app.id}/audiobooks"
        container: "/audiobooks"
        type: media
      - name: podcasts
        host: "/var/lib/youeye/app-${app.id}/podcasts"
        container: "/podcasts"
        type: media
      - name: metadata
        host: "/var/lib/youeye/app-${app.id}/metadata"
        container: "/metadata"
        type: data
    healthCheck:
      type: "http"
      path: "/healthcheck"
      timeout: 120000
