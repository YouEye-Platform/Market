apiVersion: v1
kind: app
integration: basic
version: "26.6.0"

metadata:
  id: "actual-budget"
  name: "Actual Budget"
  description: "Privacy-focused envelope budgeting with bank sync"
  icon: "wallet"
  iconUrl: "icon.svg"
  category: "productivity"
  website: "https://actualbudget.org"
  tags: ["budget", "finance", "money", "personal-finance"]
  defaultSubdomain: "budget"

detail:
  longDescription: |
    Actual Budget is a super fast, privacy-focused app for managing your finances. Uses
    envelope-style budgeting to help you track spending, plan ahead, and stay on top of
    your money. Features include bank sync, powerful reports, custom rules, and a responsive
    interface.
  screenshots:
    - path: "https://raw.githubusercontent.com/actualbudget/actual/master/packages/desktop-client/public/static/app-preview.png"
      caption: "Actual Budget overview"

database:
  mode: none

containers:
  - name: "main"
    type: oci
    primary: true
    image: "docker.io/actualbudget/actual-server:26.6.0"
    port: 5006
    network: internet
    volumes:
      - name: data
        host: "/var/lib/youeye/app-${app.id}/data"
        container: "/data"
        type: data
    healthCheck:
      type: "http"
      path: "/"
      timeout: 120000

sso:
  type: oauth2
  callback_path: /openid/callback
  setup:
    method: env
  redirectUris:
    - url: "${install.url}/openid/callback"

# Actual Budget reads OIDC purely from env. The FIRST user to sign in through the
# identity provider becomes the server owner/admin; Actual does NOT read group or
# role claims, so additional admins are assigned manually in its User Directory.
env_mapping:
  ACTUAL_OPENID_DISCOVERY_URL: "${sso.discovery_url}"
  ACTUAL_OPENID_CLIENT_ID: "${sso.client_id}"
  ACTUAL_OPENID_CLIENT_SECRET: "${sso.client_secret}"
  ACTUAL_OPENID_SERVER_HOSTNAME: "${app.url}"
  ACTUAL_OPENID_AUTH_METHOD: "openid"
  ACTUAL_USER_CREATION_MODE: "login"
