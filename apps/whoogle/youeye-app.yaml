apiVersion: v1
kind: app
integration: basic
version: "0.9.0"

metadata:
  id: "whoogle"
  name: "Whoogle"
  description: "Privacy-respecting search frontend"
  icon: "search"
  iconUrl: "icon.png"
  category: "search"
  website: "https://github.com/benbusby/whoogle-search"
  tags: ["search", "privacy", "frontend"]
  defaultSubdomain: "whoogle"

detail:
  longDescription: |
    A self-hosted, ad-free, privacy-respecting search frontend. Query results without ads,
    JavaScript, AMP links, cookies, or IP address tracking.
  screenshots:
    - path: "https://raw.githubusercontent.com/benbusby/whoogle-search/main/docs/screenshot_desktop.png"
      caption: "Whoogle search results"

database:
  mode: none

containers:
  - name: "main"
    type: oci
    primary: true
    image: "docker.io/benbusby/whoogle-search:0.9.0"
    port: 5000
    network: internet
    healthCheck:
      type: "http"
      path: "/"
      timeout: 120000

env_mapping:
  WHOOGLE_DOTENV: "1"
  WHOOGLE_CSP: "1"
  WHOOGLE_LANGUAGE: "${platform.locale_full}"
