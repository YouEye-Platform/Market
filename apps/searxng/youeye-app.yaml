apiVersion: v1
kind: app
integration: basic
version: "2026.3.29"

metadata:
  id: "searxng"
  name: "SearXNG"
  description: "Privacy-respecting metasearch engine"
  icon: "search"
  iconUrl: "icon.svg"
  category: "search"
  website: "https://docs.searxng.org"
  tags: ["search", "privacy", "metasearch"]
  defaultSubdomain: "searx"

detail:
  longDescription: |
    A free internet metasearch engine which aggregates results from more than 70 search services.
    Users are neither tracked nor profiled.
  screenshots: []

database:
  mode: none

secrets:
  - name: "secret_key"
    file: ".secret_key"
    generator: "secretKey"
    length: 32

containers:
  - name: "redis"
    type: oci
    image: "docker.io/valkey/valkey:8-alpine"

  - name: "main"
    type: oci
    primary: true
    image: "docker.io/searxng/searxng:2026.3.29-7ac4ff39f"
    port: 8080
    network: internet
    volumes:
      - name: config
        host: "/var/lib/youeye/app-${app.id}/config"
        container: "/etc/searxng"
        type: config
    healthCheck:
      type: "http"
      path: "/"
      timeout: 120000

provides:
  - type: search-engine
    description: "Privacy-respecting metasearch engine"
    port: 8080
    scope: service   # one shared SearXNG instance serves the whole server

env_mapping:
  SEARXNG_BASE_URL: "${app.url}"
  SEARXNG_SECRET: "${secrets.secret_key}"
  SEARXNG_REDIS_URL: "redis://${containers.redis.internal_host}:6379/0"
  SEARXNG_DEFAULT_LANG: "${platform.locale}"

configFiles:
  - path: "/var/lib/youeye/app-${app.id}/config/settings.yml"
    permission: "0o644"
    directoryPermission: "0o700"
    template: |
      use_default_settings: true
      general:
        instance_name: "SearXNG"
      server:
        secret_key: "${secrets.secret_key}"
        bind_address: "0.0.0.0"
        port: 8080
        base_url: "${app.url}"
        limiter: false
        image_proxy: true
      search:
        safe_search: 0
        autocomplete: "duckduckgo"
        default_lang: "${platform.locale}"
        formats:
          - html
          - json
          - rss
      redis:
        url: "redis://${containers.redis.internal_host}:6379/0"
      ui:
        static_use_hash: true
        default_theme: simple
        theme_args:
          simple_style: dark
