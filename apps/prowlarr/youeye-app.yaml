apiVersion: v1
kind: app
integration: basic
version: "2.4.0"

metadata:
  id: "prowlarr"
  name: "Prowlarr"
  description: "Indexer manager and proxy for the *arr media stack"
  icon: "radar"
  category: "media"
  website: "https://prowlarr.com"
  developer: "Team Prowlarr"
  license: "GPL-3.0"
  sourceCode: "https://github.com/Prowlarr/Prowlarr"
  support: "https://wiki.servarr.com/prowlarr"
  docs: "https://wiki.servarr.com/prowlarr"
  tagline: "One place to manage every indexer"
  tags: ["media", "indexer", "automation", "arr", "torrent", "usenet"]
  defaultSubdomain: "prowlarr"

detail:
  longDescription: |
    Prowlarr is an indexer manager and proxy built on the popular *arr base. It integrates
    with Sonarr and Radarr to manage all of your torrent and Usenet indexers in one place —
    add an indexer once in Prowlarr and it syncs automatically to every connected app. No
    more configuring the same trackers over and over in each application.
  screenshots: []

database:
  mode: none

containers:
  - name: "main"
    type: oci
    primary: true
    image: "docker.io/linuxserver/prowlarr:2.4.0.5397-ls151"
    port: 9696
    network: internet
    volumes:
      - name: config
        host: "/var/lib/youeye/app-${app.id}/config"
        container: "/config"
        type: config
    healthCheck:
      type: "http"
      path: "/ping"
      timeout: 120000

# How the wire-runner reads this app's API key (for connection wiring).
apiKey:
  file: "/config/config.xml"
  pattern: "<ApiKey>([a-f0-9]+)</ApiKey>"

provides:
  - type: indexer
    description: "Torrent/Usenet indexer management and search"
    port: 9696
    scope: service   # one shared Prowlarr serves the whole server's *arr stack

env_mapping:
  PUID: "0"
  PGID: "0"
  TZ: "Etc/UTC"
