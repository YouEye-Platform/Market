apiVersion: v1
kind: catalog

# Market categories — drive the category pills, section headers, ordering, icons, and
# fallback tile colours in the Market UI. Data-driven: adding/renaming a category is a
# change here only (no Control Panel code change). `icon` is a Lucide icon name.
categories:
  - id: productivity
    label: Productivity
    icon: briefcase
    order: 1
    tile: { bg: "#eff6ff", fg: "#2563eb" }
  - id: media
    label: Media
    icon: clapperboard
    order: 2
    tile: { bg: "#fdf2f8", fg: "#db2777" }
  - id: search
    label: Search
    icon: search
    order: 3
    tile: { bg: "#f5f3ff", fg: "#7c3aed" }
  - id: social
    label: Social
    icon: users
    order: 4
    tile: { bg: "#ecfeff", fg: "#0891b2" }
  - id: utilities
    label: Utilities
    icon: wrench
    order: 5
    tile: { bg: "#f0f9ff", fg: "#0284c7" }
  - id: downloaders
    label: Downloaders
    icon: download
    order: 6
    tile: { bg: "#fff7ed", fg: "#ea580c" }
  - id: other
    label: Other
    icon: package
    order: 99
    tile: { bg: "#f4f4f5", fg: "#52525b" }

# Curation — editorial layout for the Market home (data-driven). `spotlight` is the
# "Built for <server>" strip (ordered app ids); `collections` are extra labeled rows.
# Apps listed here render in their curated strip instead of the generic category browse,
# so they are never shown twice. Adding/reordering is a change here only.
curation:
  spotlight:
    title: Built for your server
    apps: [wiki, search, notes, cinema, weather, translate]
  collections:
    - id: private-search
      label: Private search
      apps: [searxng, whoogle, redlib, wikiless]
    - id: media-and-files
      label: Media & files
      apps: [jellyfin, immich, nextcloud]

# Bundles — curated install-and-wire recipes (a bundle installs its members together and
# arrives pre-wired). Each entry references bundles/<id>/bundle.yaml. NOT a container/app.
bundles:
  - id: private-search
    file: bundles/private-search/bundle.yaml
    latestVersion: "0.1.0"
  - id: media-automation
    file: bundles/media-automation/bundle.yaml
    latestVersion: "0.1.0"

apps:
